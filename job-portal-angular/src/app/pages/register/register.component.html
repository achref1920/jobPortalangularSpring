<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gray-50 relative overflow-hidden">
      <div class="max-w-md w-full space-y-8 bg-white/60 backdrop-blur-xl p-10 rounded-3xl shadow-xl border border-white/50 relative z-10 transition-all hover:shadow-2xl hover:bg-white/70">
        <div>
          <h2 class="mt-2 text-center text-3xl font-extrabold text-gray-900">Créer un compte</h2>
          <p class="mt-2 text-center text-sm text-gray-600">
            Ou <a routerLink="/login" class="font-medium text-indigo-600 hover:text-indigo-500 transition-colors">connectez-vous à votre compte existant</a>
          </p>
        </div>
        <form class="mt-8 space-y-6" (ngSubmit)="onSubmit()" #registerForm="ngForm">
          <div class="space-y-4">
            <div>
              <label for="username" class="sr-only">Nom d'utilisateur</label>
              <input id="username" name="username" type="text" required [(ngModel)]="user.username" class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm bg-white/50 backdrop-blur-sm transition-all shadow-sm" placeholder="Nom d'utilisateur">
            </div>
            <div>
              <label for="email-address" class="sr-only">Adresse e-mail</label>
              <input id="email-address" name="email" type="email" autocomplete="email" required [(ngModel)]="user.email" class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm bg-white/50 backdrop-blur-sm transition-all shadow-sm" placeholder="Adresse e-mail">
            </div>
            <div>
              <label for="password" class="sr-only">Mot de passe</label>
              <input id="password" name="password" type="password" required [(ngModel)]="user.password" class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm bg-white/50 backdrop-blur-sm transition-all shadow-sm" placeholder="Mot de passe">
            </div>
            <div>
               <label class="block text-sm font-medium text-gray-700 mb-1">Rôle</label>
               <select name="role" [(ngModel)]="user.role" class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-gray-300 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm bg-white/50 backdrop-blur-sm transition-all shadow-sm cursor-pointer">
                 <option value="candidate">Chercheur d'emploi</option>
                 <option value="recruiter">Recruteur / Employeur</option>
               </select>
            </div>
          </div>

          <div *ngIf="errorMessage" class="text-red-500 text-sm text-center bg-red-50 p-2 rounded-lg border border-red-100">
            {{errorMessage}}
          </div>
          <div *ngIf="successMessage" class="text-green-500 text-sm text-center bg-green-50 p-2 rounded-lg border border-green-100">
            {{successMessage}}
          </div>

          <div>
            <button type="submit" [disabled]="!registerForm.form.valid || loading" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-xl text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
              <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                <svg *ngIf="!loading" class="h-5 w-5 text-indigo-300 group-hover:text-indigo-200 transition-colors" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                  <path d="M8 9a3 3 0 100-6 3 3 0 000 6zM8 11a6 6 0 016 6H2a6 6 0 016-6zM16 7a1 1 0 10-2 0v1h-1a1 1 0 100 2h1v1a1 1 0 102 0v-1h1a1 1 0 100-2h-1V7z" />
                </svg>
                <svg *ngIf="loading" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
              </span>
              {{ loading ? 'Création du compte...' : 'Créer un compte' }}
            </button>
          </div>
        </form>
      </div>
    </div>
